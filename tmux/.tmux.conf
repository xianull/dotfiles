# -- general

setw -g xterm-keys on
set-window-option -g xterm-keys on
set -s escape-time 0
set -sg repeat-time 300
set -s focus-events on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -sg exit-empty on
set -g detach-on-destroy off
set -g allow-passthrough on
set -g default-shell /bin/zsh
set -gu default-command

set -q -g status-utf8 on
setw -q -g utf8 on

set -g visual-activity off
setw -g monitor-activity off
setw -g monitor-bell off

set -g history-limit 10000

# reload configuration
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

set -ga update-environment '\
DISPLAY DBUS_SESSION_BUS_ADDRESS \
QT_IM_MODULE QT_QPA_PLATFORMTHEME \
SESSION_MANAGER \
XDG_CONFIG_HOME XDG_CACHE_HOME XDG_DATA_HOME\
XDG_MENU_PREFIX XDG_RUNTIME_DIR XDG_SESSION_CLASS \
XDG_SESSION_DESKTOP XDG_SESSION_TYPE XDG_CURRENT_DESKTOP \
XMODIFIERS \
FZF_DEFAULT_OPTS \
TMUX_THEME_COLOR \
TERM TERM_PROGRAM \
'

# -- Hooks
set-hook -gu client-attached
set-hook -g client-attached 'run -b "tmux refresh-client -S"'

set-hook -gu pane-focus-in
set-hook -ag pane-focus-in 'run -b "tmux refresh-client -S"'

set-hook -gu after-select-window
set-hook -ag after-select-window 'run -b "tmux refresh-client -S"'

set-hook -gu client-session-changed
set-hook -ag client-session-changed 'run -b "tmux refresh-client -S"'

set-hook -gu session-created
set-hook -ag session-created 'run -b "tmux refresh-client -S"'

set-hook -gu session-renamed
set-hook -g session-renamed 'run -b "tmux refresh-client -S"'

set-hook -gu session-closed
set-hook -g session-closed 'run -b "tmux refresh-client -S"'

# -- prefix
unbind C-b
set -g prefix 'C-s'

# -- display
set -g base-index 1
setw -g pane-base-index 1

setw -g automatic-rename on
set -g renumber-windows on

set -g set-titles on

set -g display-panes-time 2000
set -g display-time 2000

# -- navigation

# create session
bind C-c new-session
bind -n M-S new-session
bind -n M-O break-pane

# window management
bind -n M-o new-window -a -c "#{pane_current_path}"
bind -n M-Q kill-pane
bind . command-prompt -p "Rename session to:" "rename-session '%%'"
unbind ,
bind , command-prompt -p "Rename window:" "rename-window '%%'"

# window navigation
unbind n
unbind p
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
unbind 0
bind -r C-p previous-window
bind -r C-n next-window

bind -n C-M-1 select-window -t 1
bind -n C-M-2 select-window -t 2
bind -n C-M-3 select-window -t 3
bind -n C-M-4 select-window -t 4
bind -n C-M-5 select-window -t 5
bind -n C-M-6 select-window -t 6
bind -n C-M-7 select-window -t 7
bind -n C-M-8 select-window -t 8
bind -n C-M-9 select-window -t 9

bind -n C-M-! join-pane -t :1
bind -n C-M-@ join-pane -t :2
bind -n 'C-M-#' join-pane -t :3
bind -n 'C-M-$' join-pane -t :4
bind -n C-M-% join-pane -t :5
bind -n C-M-^ join-pane -t :6
bind -n C-M-& join-pane -t :7
bind -n C-M-* join-pane -t :8
bind -n C-M-( join-pane -t :9

# split panes (prefix + j/i/k/l = left/up/down/right)
bind i split-window -vb -c "#{pane_current_path}"
bind k split-window -v -c "#{pane_current_path}"
bind j split-window -hb -c "#{pane_current_path}"
bind l split-window -h -c "#{pane_current_path}"

bind -n C-M-f resize-pane -Z

# pane navigation (Ctrl+Alt + j/i/k/l = left/up/down/right)
bind -n C-M-j select-pane -L
bind -n C-M-k select-pane -D
bind -n C-M-i select-pane -U
bind -n C-M-l select-pane -R

bind > swap-pane -D
bind < swap-pane -U
bind | swap-pane

# pane resizing (Ctrl+Alt + Shift + J/K/I/L = left/up/down/right)
bind -n C-M-J resize-pane -L 3
bind -n C-M-K resize-pane -D 3
bind -n C-M-I resize-pane -U 3
bind -n C-M-L resize-pane -R 3

# window navigation
bind -n C-M-h previous-window
bind -n M-y next-window

set -g status-keys emacs
set -g mode-keys vi

bind -n M-v copy-mode

# copy mode (j/i/k/l navigation)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi j send-keys -X cursor-left
bind -T copy-mode-vi l send-keys -X cursor-right
bind -T copy-mode-vi i send-keys -X cursor-up
bind -T copy-mode-vi k send-keys -X cursor-down
bind -T copy-mode-vi h send-keys -X next-word-end
bind -T copy-mode-vi I send-keys -N 5 -X cursor-up
bind -T copy-mode-vi K send-keys -N 5 -X cursor-down
bind -T copy-mode-vi J send-keys -X start-of-line
bind -T copy-mode-vi L send-keys -X end-of-line
bind -T copy-mode-vi Y send-keys -X copy-end-of-line
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi = send-keys -X search-again

bind b list-buffers
bind p paste-buffer

bind W choose-tree -Z
bind S choose-tree 'move-pane -v -s "%%"'
bind V choose-tree 'move-pane -h -s "%%"'

# -- toggle synchronize panes
bind C-g if-shell '[[ $(tmux showw synchronize-panes | cut -d\  -f2) == "on" ]]' \
'setw synchronize-panes off' \
'setw synchronize-panes on'

# -- theme (Gruvbox)

# panes
setw -g pane-border-status top
set -g pane-scrollbars off
set -g pane-scrollbars-position right
set -g pane-active-border-style fg=#fe8019
set -g pane-border-style fg=#504945
setw -g pane-border-format '#{?pane_active, #[fg=#fe8019] #{?window_zoomed_flag,⛶ ,}#{pane_current_command} #[default], #[fg=#504945] #{?window_zoomed_flag,⛶ ,}#{pane_current_command} #[default]}'

# windows
set -g status on
set -g status-justify 'left'
set -g status-interval 1
set -g status-left-length 90
set -g status-right-length 170
setw -g window-status-separator ''

set -g status-bg #282828
set -g status-fg #ebdbb2
setw -g window-status-format '#[fg=#928374] #I:#W '
setw -g window-status-current-format '#[fg=#fabd2f,bold] #I:#W '
setw -g window-status-activity-style bg=#282828
setw -g window-status-bell-style bg=#282828

set-option -g status-left '#[fg=#fb4934,bold] #S  '
set-option -g status-right '#[fg=#928374] %Y-%m-%d %H:%M '

# True color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",*256col*:RGB"
set -as terminal-overrides ",*256col*:Tc"
unbind -T copy-mode-vi C-u
unbind -T copy-mode-vi C-e
bind -T copy-mode-vi C-u send-keys -N 5 -X scroll-up
bind -T copy-mode-vi C-e send-keys -N 5 -X scroll-down

# ─── Plugins (TPM) ───────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @tpm-install 'M-F12'
set -g @tpm-update 'M-F12'
set -g @tpm-clean 'M-F12'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'script lazygit yazi'

# Continuum: auto-save every 5 minutes
set -g @continuum-save-interval '5'
set -g @continuum-restore 'off'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
